name: Build NekoBoard Executable

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyaudio numpy keyboard
      # Note: pyaudio wheel may need special handling; fallback to pip install
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name NekoBoard `
          --add-data "gui.py;." `
          --add-data "audio.py;." `
          --add-data "sound_manager.py;." `
          --add-data "hotkeys.py;." `
          nekoboard.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NekoBoard-Executable
        path: dist/NekoBoard.exe
